{
    "PrEval": {
        "DscPath": "OpensslPkg.dsc",
    },
    "LicenseCheck": {
        "IgnoreFiles": [
            # These directories contain auto-generated OpenSSL content
            "Library/OpensslLib/IA32",
            "Library/OpensslLib/IA32Gcc",
            "Library/OpensslLib/X64",
            "Library/OpensslLib/X64Gcc",
            "Library/Include/openssl"
        ]
    },
    "EccCheck": {
        ## Exception sample looks like below:
        ## "ExceptionList": [
        ##     "<ErrorID>", "<KeyWord>"
        ## ]
        "ExceptionList": [
            "8001", "IsLeap",
            "8001", "OBJ_get0_data",
            "8001", "OBJ_length",
            "5005", "X509PopCertificate"
        ],
        ## Both file path and directory path are accepted.
        "IgnoreFiles": [
            "Library/OpensslLib/openssl",
            "Library/Include/openssl",
            "Library/Include/crypto",
            # This has OpenSSL interfaces that aren't UEFI spec compliant
            "Library/BaseCryptLib/SysCall",
            # This has OpenSSL interfaces that aren't UEFI spec compliant
            "Library/OpensslLib/OpensslStub/rand_pool.c",
            # This has OpenSSL interfaces that aren't UEFI spec compliant
            "Library/Include/CrtLibSupport.h",
            # This has OpenSSL interfaces that aren't UEFI spec compliant
            "Library/BaseCryptLib/Hash/CryptParallelHash.h",
            "Library/Include/fcntl.h",
            # These directories contain auto-generated OpenSSL content
            "Library/OpensslLib",
            "Library/BaseCryptLib/Pk/CryptPkcs7VerifyBase.c"
        ]
    },
    "CompilerPlugin": {
        "DscPath": "OpensslPkg.dsc"
    },
    ## options defined .pytool/Plugin/HostUnitTestCompilerPlugin
    "HostUnitTestCompilerPlugin": {
        "DscPath": "Test/OpensslPkgHostUnitTest.dsc"
    },
    "CharEncodingCheck": {
        "IgnoreFiles": []
    },
    "DependencyCheck": {
        "AcceptableDependencies": [
            "MdePkg/MdePkg.dec",
            "MdeModulePkg/MdeModulePkg.dec",
            "CryptoPkg/CryptoPkg.dec",
            "IntrinsicPkg/IntrinsicPkg.dec",
            "OpensslPkg/OpensslPkg.dec",
        ],
        # For host based unit tests
        "AcceptableDependencies-HOST_APPLICATION":[],
        # For UEFI shell based apps
        "AcceptableDependencies-UEFI_APPLICATION":[],
        "IgnoreInf": []
    },
    "DscCompleteCheck": {
        "DscPath": "OpensslPkg.dsc",
        "IgnoreInf": [
            "OpensslPkg/Library/OpensslLib/OpensslLibAccel.inf",
            "OpensslPkg/Library/OpensslLib/OpensslLibFull.inf",
            "OpensslPkg/Library/OpensslLib/OpensslLibFullAccel.inf",
            "OpensslPkg/Library/OpensslLib/OpensslLibSm3.inf",
            "OpensslPkg/Library/BaseCryptLib/UnitTestHostBaseCryptLib.inf"
        ]
    },
    "GuidCheck": {
        "IgnoreGuidName": [],
        "IgnoreGuidValue": [
            "63850097-3E97-4C4F-A52D-C811A0106105",  # MU_CHANGE
            "6BD7DE60-9EF7-4899-97D0-ABFFFD-E970F2"  # gEfiCryptoPkgTokenSpaceGuid - shared with CryptoPkg
        ],
        "IgnoreFoldersAndFiles": [
            "MU_BASECORE"  # MU_CHANGE
        ]
    },
    "LibraryClassCheck": {
        "IgnoreHeaderFile": []
    },
    "MarkdownLintCheck": {
        "AuditOnly": False,          # If True, log all errors and then mark as skipped
        "IgnoreFiles": [
            "Library/OpensslLib/openssl"
        ]            # package root relative file, folder, or glob pattern to ignore
    },

    ## options defined ci/Plugin/SpellCheck
    "SpellCheck": {
        "skip": True,
        "IgnoreFiles": [],           # use gitignore syntax to ignore errors in matching files
        "ExtendWords": [],           # words to extend to the dictionary for this package
        "IgnoreStandardPaths": [],   # Standard Plugin defined paths that should be ignore
        "AdditionalIncludePaths": [] # Additional paths to spell check (wildcards supported)
    },

    # options defined in .pytool/Plugin/UncrustifyCheck
    "UncrustifyCheck": {
        "IgnoreFiles": [
            "Library/OpensslLib/openssl/**",       # MU_CHANGE
            "Library/OpensslLib/OpensslGen/**",     # MU_CHANGE
            "Library/OpensslLib/OpensslStub/**",    # MU_CHANGE
            "Library/Include/openssl/**",           # MU_CHANGE
            "Library/Include/crypto/**",            # MU_CHANGE
            "**/opensslconf.h",                     # MU_CHANGE
            "**/dso_conf.h",                        # MU_CHANGE
            "**/opensslconf_generated.h"            # MU_CHANGE
        ]
    }
}
